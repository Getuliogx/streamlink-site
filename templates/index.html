
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Streamlink Downloader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="card">
    <h1>Streamlink Downloader</h1>
    <p>Baixe vídeos/streams por URL em <b>.TS</b> ou <b>.MP4 H.264 AVC1</b>.</p>

    <form method="post" action="/download" onsubmit="baixando()">
      <label>URL do vídeo/stream</label>
      <input name="url" required placeholder="https://..." value="{{ last_url or '' }}">

      <div class="grid">
        <div>
          <label>Formato</label>
          <select name="format">
            <option value="mp4">MP4 - H.264 / AVC1</option>
            <option value="ts">TS - MPEG-TS</option>
          </select>
        </div>
        <div>
          <label>Qualidade</label>
          <select name="quality">
            <option value="best">best</option>
            <option value="1080p">1080p</option>
            <option value="720p">720p</option>
            <option value="480p">480p</option>
            <option value="360p">360p</option>
            <option value="worst">worst</option>
          </select>
        </div>
      </div>

      <button id="btn" type="submit">Baixar</button>
    </form>

    {% if error %}
      <pre class="error">{{ error }}</pre>
    {% endif %}

    <p class="obs">
      Se uma URL tiver DRM, bloqueio de região, login obrigatório ou vídeo expirado, nenhum site consegue baixar sem autorização.
    </p>
  </main>

<script>
function baixando(){
  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerText = "Baixando... aguarde";
}
</script>
</body>
</html>
