<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Streamlink Downloader</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="card">
    <h1>Streamlink Downloader</h1>
    <p>Baixe vídeos/streams por URL em <b>.TS</b> ou <b>.MP4 H.264 AVC1</b>.</p>
    <label>URL do vídeo/stream</label>
    <input id="url" placeholder="Cole a URL ou .m3u8 aqui">
    <div class="grid">
      <div><label>Formato</label><select id="formato"><option value="mp4">MP4 - H.264 / AVC1</option><option value="ts">TS original</option></select></div>
      <div><label>Qualidade</label><select id="qualidade"><option>best</option><option>1080p</option><option>720p</option><option>480p</option><option>360p</option><option>worst</option></select></div>
    </div>
    <button id="btn">Baixar</button>
    <div id="status"></div>
    <small>Obs: se o vídeo tiver DRM, bloqueio de região ou URL expirada, o servidor não consegue baixar.</small>
  </main>
<script>
const btn = document.getElementById('btn');
const statusBox = document.getElementById('status');
btn.onclick = async () => {
  statusBox.className = 'info';
  statusBox.textContent = 'Processando no servidor... pode demorar.';
  btn.disabled = true;
  try {
    const r = await fetch('/baixar', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:document.getElementById('url').value, formato:document.getElementById('formato').value, qualidade:document.getElementById('qualidade').value})});
    const j = await r.json();
    if (!j.ok) throw new Error(j.erro || 'Erro desconhecido');
    statusBox.className = 'ok';
    statusBox.innerHTML = `${j.mensagem}<br><a href="${j.download}">Clique aqui para baixar: ${j.arquivo}</a>`;
  } catch(e) {
    statusBox.className = 'erro';
    statusBox.textContent = e.message;
  } finally { btn.disabled = false; }
};
</script>
</body>
</html>
