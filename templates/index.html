<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamlink Downloader</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<h1>Streamlink Downloader</h1>

<form action="/download" method="POST">

<label>URL</label>
<input type="text" name="url" required placeholder="Cole a URL aqui">

<div class="grid">

<div>
<label>Formato</label>
<select name="format">
<option value="ts">TS</option>
<option value="mp4">MP4 H264 AVC1</option>
</select>
</div>

<div>
<label>Qualidade</label>
<select name="quality">
<option value="best">best</option>
<option value="1080p">1080p</option>
<option value="720p">720p</option>
<option value="480p">480p</option>
<option value="360p">360p</option>
</select>
</div>

</div>

<button type="submit">Baixar</button>

</form>

{% if error %}
<div class="error">
<pre>{{ error }}</pre>
</div>
{% endif %}

</div>

</body>
</html>
