
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamlink Downloader</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
  <h1>Streamlink Downloader</h1>

  <div class="cmd">
    comando usado:<br>
    <b>streamlink --output "nome do video.ts" "url" best</b>
  </div>

  <label>URL</label>
  <input id="url" type="text" placeholder="Cole a URL aqui">

  <label>Qualidade</label>
  <select id="quality">
    <option value="best">best</option>
    <option value="1080p">1080p</option>
    <option value="720p">720p</option>
    <option value="480p">480p</option>
    <option value="360p">360p</option>
  </select>

  <button id="btn" onclick="startDownload()">Baixar TS</button>

  <div id="status" class="status hidden"></div>

  <a id="downloadLink" class="download hidden" href="#">Baixar arquivo pronto</a>

  <pre id="log" class="log hidden"></pre>
</div>

<script>
let currentJob = null;
let timer = null;

function show(el){ el.classList.remove("hidden"); }
function hide(el){ el.classList.add("hidden"); }

async function startDownload(){
  const url = document.getElementById("url").value.trim();
  const quality = document.getElementById("quality").value;

  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const log = document.getElementById("log");
  const link = document.getElementById("downloadLink");

  hide(link);
  show(status);
  show(log);
  status.className = "status";
  status.innerText = "Iniciando...";
  log.innerText = "";

  if(!url){
    status.className = "status error";
    status.innerText = "Cole uma URL.";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Baixando...";

  try{
    const r = await fetch("/start", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({url, quality})
    });

    const data = await r.json();
    if(!data.ok) throw new Error(data.error || "Erro ao iniciar.");

    currentJob = data.job_id;
    timer = setInterval(checkStatus, 2000);
    checkStatus();
  }catch(e){
    status.className = "status error";
    status.innerText = e.message;
    btn.disabled = false;
    btn.innerText = "Baixar TS";
  }
}

async function checkStatus(){
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const log = document.getElementById("log");
  const link = document.getElementById("downloadLink");

  try{
    const r = await fetch("/status/" + currentJob);
    const data = await r.json();

    if(!data.ok) throw new Error(data.error || "Erro status.");

    log.innerText = (data.logs || []).join("\n");
    log.scrollTop = log.scrollHeight;

    if(data.status === "queued" || data.status === "running"){
      status.className = "status";
      status.innerText = "Baixando no servidor...";
    }

    if(data.status === "done"){
      clearInterval(timer);
      status.className = "status ok";
      status.innerText = "Arquivo pronto.";
      link.href = data.download_url;
      link.innerText = "Baixar " + data.filename;
      show(link);
      btn.disabled = false;
      btn.innerText = "Baixar TS";
    }

    if(data.status === "error"){
      clearInterval(timer);
      status.className = "status error";
      status.innerText = data.error || "Erro.";
      btn.disabled = false;
      btn.innerText = "Baixar TS";
    }
  }catch(e){
    clearInterval(timer);
    status.className = "status error";
    status.innerText = e.message;
    btn.disabled = false;
    btn.innerText = "Baixar TS";
  }
}
</script>

</body>
</html>
